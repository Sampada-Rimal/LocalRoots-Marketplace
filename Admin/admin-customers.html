<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalRoots Customer Management</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="dashboard">
  <aside class="sidebar">
    <div>
      <div class="brand">
        
        <h2>LocalRoots</h2>
        <p>Admin Panel</p>
      </div>

      <nav class="menu">
        <a href="admin-dashboard.php">Dashboard</a>
        <a href="admin-vendors.html">Vendors</a>
        <a href="admin-customers.html" class="active">Customers</a>
        <a href="admin-products.html">Products</a>
        <a href="admin-orders.html">Orders</a>
        <a href="admin-reports.html">Reports</a>
        <a href="admin-settings.html">Settings</a>
      </nav>
    </div>

      
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h1>Customer Management</h1>
        <p>Manage all customer accounts</p>
      </div>

      <div class="topbar-right">
      
        <input type="text" id="topCustomerSearchInput" placeholder="Search customers">
                <a href="admin-login.php" class="logout-btn-top">Logout</a>

      </div>
    </header>

    <section class="card">
      <div class="card-header">
        <h2>All Customers</h2>
        <button id="openAddCustomerBtn">Add Customer</button>
      </div>

      <div class="filter-row">
        <input type="text" id="searchCustomerName" placeholder="Search by name">
        <select id="customerStatusFilter">
          <option value="All">All Status</option>
          <option value="Active">Active</option>
          <option value="Suspended">Suspended</option>
        </select>
      </div>

      <table>
        <thead>
          <tr>
            <th>Customer ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Total Orders</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="customerTableBody"></tbody>
      </table>
    </section>

    <section class="card" id="addCustomerCard" style="display: none;">
      <div class="card-header">
        <h2>Add New Customer</h2>
      </div>

      <form id="addCustomerForm" class="form-grid">
        <div class="form-group">
          <label for="customerName">Customer Name</label>
          <input type="text" id="customerName" required>
        </div>

        <div class="form-group">
          <label for="customerEmail">Email</label>
          <input type="email" id="customerEmail" required>
        </div>

        <div class="form-group">
          <label for="customerPhone">Phone</label>
          <input type="text" id="customerPhone" required>
        </div>

        <div class="form-group">
          <label for="customerAddress">Address</label>
          <input type="text" id="customerAddress" required>
        </div>

        <div class="form-group">
          <label for="customerOrders">Total Orders</label>
          <input type="number" id="customerOrders" min="0" required>
        </div>

        <div class="form-group">
          <label for="customerStatus">Status</label>
          <select id="customerStatus" required>
            <option value="Active">Active</option>
            <option value="Suspended">Suspended</option>
          </select>
        </div>

        <div class="form-group full-width">
          <button type="submit" class="form-btn">Save Customer</button>
        </div>
      </form>
    </section>
  </main>
</div>

<script src="admin-customers.js"></script>
</body>
</html>
